name: Build precompiled NIFs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            use-cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use-cross: true

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^[[:space:]]*@version \"\(.*\)\"/\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"
          targets: ${{ matrix.job.target }}

      - name: Build native archive
        id: build_crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: og_ex_native
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: native/og_ex_native

      - name: Attest native archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.build_crate.outputs.file-path }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build_crate.outputs.file-name }}
          path: ${{ steps.build_crate.outputs.file-path }}

      - name: Attach archive to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_crate.outputs.file-path }}
